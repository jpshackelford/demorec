name: PR Review by OpenHands

on:
  pull_request:
    types: [opened, ready_for_review, labeled, review_requested]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pr-review:
    # Temporary: allow failure - litellm package currently unavailable on PyPI
    # See: https://github.com/OpenHands/extensions/issues/119
    continue-on-error: true
    # Only run for PRs from this repo (not forks) to access secrets
    # Also requires LLM_API_KEY secret to be configured
    # Triggers:
    #   - Non-draft PR opened
    #   - Draft PR marked ready for review
    #   - 'review-this' label added
    #   - Review requested from openhands-agent
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
        github.event.action == 'ready_for_review' ||
        (github.event.action == 'labeled' && github.event.label.name == 'review-this') ||
        (
          github.event.action == 'review_requested' &&
          github.event.requested_reviewer.login == 'openhands-agent'
        )
      )
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    steps:
      - name: Check for LLM API key
        id: check-secret
        run: |
          if [ -z "${{ secrets.LLM_API_KEY }}" ]; then
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "::warning::LLM_API_KEY secret not configured. Skipping AI review."
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: Run PR Review
        if: steps.check-secret.outputs.has_key == 'true'
        # Note: litellm package currently unavailable on PyPI, so this may fail
        # See: https://github.com/OpenHands/extensions/issues/119
        uses: OpenHands/extensions/plugins/pr-review@main
        with:
          llm-model: litellm_proxy/claude-sonnet-4-5-20250929
          llm-base-url: https://llm-proxy.app.all-hands.dev
          review-style: roasted
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
