name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        # Show issues but don't fail build initially (remove || true to enforce)
        run: ruff check src/ || true

      - name: Run Ruff formatter check
        # Show issues but don't fail build initially (remove || true to enforce)
        run: ruff format --check src/ || true

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run tests with coverage
        run: |
          coverage run -m pytest tests/ -v
          coverage combine || true

      - name: Check per-file coverage thresholds
        run: python scripts/check_coverage.py
        if: hashFiles('.coverage-baseline.json') != ''

      - name: Upload coverage data
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: .coverage
          if-no-files-found: warn

  complexity:
    name: Complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install radon xenon

      - name: Check cyclomatic complexity (xenon)
        # D = max absolute complexity allowed (relaxed for initial adoption)
        # B = max module complexity
        # B = max average complexity
        run: xenon --max-absolute D --max-modules B --max-average B src/demorec/

      - name: Show complexity metrics (radon)
        run: radon cc src/demorec/ -a -s

  function-length:
    name: Function Length
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check function length
        # Relaxed thresholds for initial adoption: warn at 20, error at 65
        run: python scripts/check_function_length.py src/ --warn 20 --error 65

  quality-report:
    name: Quality Report
    runs-on: ubuntu-latest
    needs: [test, complexity, function-length]
    if: always() && github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install radon

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
        continue-on-error: true

      - name: Generate quality report
        run: python scripts/quality_report.py -o quality-report.md

      - name: Post quality report to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: quality-report
          path: quality-report.md
