<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>demorec Demo</title>
    <style>
        :root {
            --bg: #0d1117;
            --fg: #c9d1d9;
            --accent: #58a6ff;
            --border: #30363d;
            --code-bg: #161b22;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        h1 {
            color: var(--fg);
            margin-bottom: 0.5rem;
        }
        .tagline {
            color: #8b949e;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        video {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        details {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        summary {
            padding: 1rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--accent);
        }
        summary:hover {
            background: rgba(88, 166, 255, 0.1);
        }
        pre {
            margin: 0;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }
        code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }
        .cta {
            text-align: center;
            margin-top: 2rem;
            padding: 2rem;
            background: var(--code-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .cta a {
            display: inline-block;
            background: var(--accent);
            color: var(--bg);
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
        }
        .cta a:hover {
            opacity: 0.9;
        }
        .cta p {
            margin-bottom: 1rem;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>demorec 🎬</h1>
        <p class="tagline">Proof of work that's easy on the eye</p>
        
        <video controls>
            <source src="demorec-intro.mp4" type="video/mp4">
            Your browser does not support the video tag.
            <track kind="subtitles" src="demorec-intro.srt" srclang="en" label="English" default>
        </video>
        
        <details>
            <summary>📄 View the script that made this video</summary>
            <pre><code id="script"></code></pre>
        </details>
        
        <details>
            <summary>🎨 View the slides (Marp markdown)</summary>
            <pre><code id="slides"></code></pre>
        </details>
        
        <div class="cta">
            <p>Create demo videos from scripts that execute real commands</p>
            <a href="https://github.com/jpshackelford/demorec">Get Started →</a>
        </div>
    </div>
    
    <script>
        // Load the script file
        fetch('demorec-intro.demorec')
            .then(r => r.text())
            .then(text => {
                document.getElementById('script').textContent = text;
            });
        
        // Load the slides file
        fetch('slides.md')
            .then(r => r.text())
            .then(text => {
                document.getElementById('slides').textContent = text;
            });
    </script>
</body>
</html>
